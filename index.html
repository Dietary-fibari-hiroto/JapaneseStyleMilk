<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルなHTMLページ</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            background-color:black;
            width:100vw;
            height:100lvh;
        }
        .hello{
            color:white;
            transition:all 3s;
        }
        .hello:hover{
            transform:scale(1.1);

        }
    </style>
</head>
<body>
    <h1 class="hello">Hello!和風牛乳!!!</h1>
</body>
</html>
